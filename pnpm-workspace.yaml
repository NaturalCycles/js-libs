packages:
  - packages/*
catalog:
  '@typescript/native-preview': beta
  oxlint: ^1
minimumReleaseAgeExclude:
  - '@naturalcycles/*'
  - vitest
  - '@vitest/*'
  - oxfmt
  - '@oxfmt/*'
  - eslint-plugin-oxlint
  - oxlint
  - oxlint-tsgolint
  - '@oxlint/*'
trustPolicy: no-downgrade
trustPolicyExclude:
  - vite@5.4.21
  - semver@5.7.2
  - jose@4.15.9
  - undici@5.29.0
  - tinyexec@1.2.2
  - ast-v8-to-istanbul@1.0.2
blockExoticSubdeps: true
auditConfig:
  ignoreGhsas:
    - GHSA-h755-8qp9-cq85
    - GHSA-67mh-4wv8-2f99
strictDepBuilds: true
ignoreWorkspaceCycles: true
publicHoistPattern:
  - '@typescript/native-preview'
allowBuilds:
  esbuild: true
  '@firebase/util': false
  protobufjs: false
